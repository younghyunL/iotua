<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IOTUA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #19438B;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 10px;
      border-radius: 20px;
      background: #fff;
      padding: 12px;
    }

    .brand-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.58);
      margin-bottom: 40px;
      letter-spacing: 0.4px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      background: rgba(255,255,255,0.13);
      border: 1.5px solid rgba(255,255,255,0.30);
      border-radius: 18px;
      padding: 15px 18px;
      margin-bottom: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s, transform 0.12s;
    }

    .link-btn:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.22);
    }

    .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-shop { background: #03C75A; }
    .icon-ig   { background: linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
    .icon-web  { background: #fff; }

    .btn-text { flex: 1; text-align: left; }

    .btn-label {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 3px;
      font-weight: 400;
    }

    .btn-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .btn-arrow {
      color: rgba(255,255,255,0.45);
      font-size: 20px;
      line-height: 1;
    }

    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.4px;
    }
  </style>
</head>
